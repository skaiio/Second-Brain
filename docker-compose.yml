services:
  couchdb:
    image: couchdb:3
    container_name: brain-couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - ./couchdb-data:/opt/couchdb/data
      - ./couchdb-config:/opt/couchdb/etc/local.d
    ports:
      - "127.0.0.1:5984:5984"   # local only; tunnel provides external HTTPS

  bridge:
    build: ./bridge
    container_name: brain-bridge
    restart: unless-stopped
    environment:
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
      - LIVESYNC_PASSPHRASE=${LIVESYNC_PASSPHRASE}
    volumes:
      - ./bridge/dat:/app/dat
      - ./vault-mirror:/app/vault-mirror
    depends_on:
      - couchdb

  mcp:
    build: ./mcp-server
    container_name: brain-mcp
    restart: unless-stopped
    environment:
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - MCP_BASE_URL=https://brain.canimagin.com/mcp
      - VAULT_DIR=/vault-mirror
    volumes:
      - ./vault-mirror:/vault-mirror
    depends_on:
      - bridge

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: brain-cloudflared
    restart: unless-stopped
    user: "1001"
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/etc/cloudflared:ro
    depends_on:
      - couchdb
      - mcp
